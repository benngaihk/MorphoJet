name: External L4 Internal Rehearsal

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "43 7 * * 2"

permissions:
  contents: read

concurrency:
  group: external-l4-internal-rehearsal
  cancel-in-progress: false

jobs:
  rehearsal:
    name: Run internal external-L4 rehearsal
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run internal rehearsal
        shell: bash
        run: |
          set -euo pipefail
          workspace="${RUNNER_TEMP}/morphojet-external-l4-rehearsal"
          fixture="${RUNNER_TEMP}/morphojet-external-l4-fixture"
          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, "benchmark")
          import check_cellprofiler_wide_contract
          import check_external_l4_readiness

          root = Path(os.environ["RUNNER_TEMP"]) / "morphojet-external-l4-fixture"
          (root / "morphojet").mkdir(parents=True, exist_ok=True)
          (root / "cellprofiler").mkdir(parents=True, exist_ok=True)

          object_columns = list(
              dict.fromkeys(
                  [
                      *check_external_l4_readiness.required_morphojet_objects_columns(),
                      "Plate",
                      "Well",
                      "Site",
                  ]
              )
          )
          rows = []
          for channel in ["DNA", "PH3"]:
              row = {column: "1" for column in object_columns}
              row.update(
                  {
                      "ImageNumber": "1",
                      "ObjectNumber": "1",
                      "Channel": channel,
                      "ObjectSet": "Cells",
                      "AreaShape_BoundingBoxMinimum_X": "0",
                      "AreaShape_BoundingBoxMinimum_Y": "0",
                      "AreaShape_BoundingBoxMaximum_X": "2",
                      "AreaShape_BoundingBoxMaximum_Y": "2",
                      "AreaShape_Solidity": "1",
                      "Plate": "P001",
                      "Well": "A01",
                      "Site": "1",
                  }
              )
              rows.append(row)
          (root / "morphojet" / "Objects.csv").write_text(
              ",".join(object_columns)
              + "\n"
              + "\n".join(",".join(row[column] for column in object_columns) for row in rows)
              + "\n",
              encoding="utf-8",
          )

          cellprofiler_columns = check_cellprofiler_wide_contract.required_columns(["DNA", "PH3"])
          (root / "cellprofiler" / "Cells.csv").write_text(
              ",".join(cellprofiler_columns) + "\n" + ",".join("1" for _ in cellprofiler_columns) + "\n",
              encoding="utf-8",
          )

          template = {
              "trial_id": "ci-internal-rehearsal",
              "description": "CI fixture for the internal external-L4 rehearsal workflow.",
              "morphojet_objects_csv": "{base_dir}/morphojet/Objects.csv",
              "required_object_metadata_columns": ["Plate", "Well", "Site"],
              "exports": [
                  {
                      "name": "Cells",
                      "object_set": "Cells",
                      "channels": ["DNA", "PH3"],
                      "out_csv": "{base_dir}/morphojet/Cells.wide.csv",
                  }
              ],
              "downstream_checks": [
                  {
                      "name": "Validate Cells wide CSV downstream contract",
                      "command": [
                          "python3",
                          "benchmark/check_cellprofiler_wide_contract.py",
                          "{base_dir}/morphojet/Cells.wide.csv",
                          "--channels",
                          "DNA,PH3",
                          "--metadata-columns",
                          "Plate,Well,Site",
                          "--min-rows",
                          "1",
                          "--json-out",
                          "{base_dir}/handoff_contract.json",
                      ],
                      "artifacts": ["{base_dir}/handoff_contract.json"],
                  }
              ],
          }
          (root / "minimal-template.json").write_text(json.dumps(template, indent=2) + "\n", encoding="utf-8")
          PY
          python3 benchmark/run_external_l4_rehearsal.py \
            --workspace "${workspace}" \
            --template "${fixture}/minimal-template.json" \
            --morphojet-objects "${fixture}/morphojet/Objects.csv" \
            --cellprofiler-cells "${fixture}/cellprofiler/Cells.csv" \
            --package-name ci-external-l4-rehearsal \
            --overwrite

      - name: Write rehearsal summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          summary="${RUNNER_TEMP}/morphojet-external-l4-rehearsal/external-l4-rehearsal-summary.md"
          {
            echo "## External L4 internal rehearsal"
            echo
            if [[ -f "${summary}" ]]; then
              cat "${summary}"
            else
              echo "No rehearsal Markdown summary was produced."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload rehearsal evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-l4-internal-rehearsal-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: |
            ${{ runner.temp }}/morphojet-external-l4-rehearsal/external-l4-rehearsal-summary.json
            ${{ runner.temp }}/morphojet-external-l4-rehearsal/external-l4-rehearsal-summary.md
            ${{ runner.temp }}/morphojet-external-l4-rehearsal/trial_plan.json
            ${{ runner.temp }}/morphojet-external-l4-rehearsal/README.md
            ${{ runner.temp }}/morphojet-external-l4-rehearsal/README.zh-CN.md
            ${{ runner.temp }}/morphojet-external-l4-rehearsal/readiness.json
            ${{ runner.temp }}/morphojet-external-l4-rehearsal/handoff_trial.json
            ${{ runner.temp }}/morphojet-external-l4-rehearsal/handoff_trial.md
            ${{ runner.temp }}/morphojet-external-l4-rehearsal/handoff_trial-verification.json
            ${{ runner.temp }}/morphojet-external-l4-rehearsal/evidence-package-verification.json
            ${{ runner.temp }}/morphojet-external-l4-rehearsal/local-evidence-preflight.json
            ${{ runner.temp }}/morphojet-external-l4-rehearsal/local-evidence-preflight.md
            ${{ runner.temp }}/morphojet-external-l4-rehearsal/evidence-package/**
