name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run Rust tests
        run: cargo test

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Check Python helpers
        run: python3 -m py_compile benchmark/*.py corpus/generate_smoke.py tests/parity/*.py

      - name: Validate oracle manifest template
        run: |
          python3 benchmark/validate_benchmark_manifest.py benchmark/cellprofiler/manifest.example.json
          python3 benchmark/run_oracle_benchmark.py --help

      - name: Run smoke benchmark
        run: |
          python3 corpus/generate_smoke.py --images 16
          benchmark/run.sh benchmark/data/smoke/images.csv benchmark/results/smoke
          python3 benchmark/summarize.py benchmark/results/smoke

      - name: Run parity self-check
        run: |
          python3 tests/parity/compare_measurements.py \
            benchmark/results/smoke/Objects.csv \
            benchmark/results/smoke/Objects.csv \
            --json-out benchmark/results/smoke/objects_parity.json \
            --fail-on-gap

      - name: Run impact reporter smoke
        run: |
          mkdir -p benchmark/results/impact-smoke
          printf '{"elapsed_seconds":600,"peak_rss_mb":8000}\n' > benchmark/results/impact-smoke/cellprofiler.metrics.json
          printf '{"elapsed_seconds":60,"peak_rss_mb":4000}\n' > benchmark/results/impact-smoke/morphojet.metrics.json
          python3 benchmark/impact_report.py \
            --image-rows 1000 \
            --object-count-parity 1.0 \
            --numeric-parity 0.99 \
            --cellprofiler-metrics-json benchmark/results/impact-smoke/cellprofiler.metrics.json \
            --morphojet-metrics-json benchmark/results/impact-smoke/morphojet.metrics.json \
            --fail-on-gap

      - name: Run command metrics smoke
        run: |
          cargo build --release -p morphojet
          python3 benchmark/run_command_metrics.py \
            --name morphojet-smoke \
            --out benchmark/results/metrics \
            --fail-on-nonzero \
            -- target/release/morphojet doctor
