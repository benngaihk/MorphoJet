name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run Rust tests
        run: cargo test

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Check Python helpers
        run: python3 -m py_compile benchmark/*.py corpus/generate_smoke.py tests/parity/*.py

      - name: Run smoke benchmark
        run: |
          python3 corpus/generate_smoke.py --images 16
          benchmark/run.sh benchmark/data/smoke/images.csv benchmark/results/smoke
          python3 benchmark/summarize.py benchmark/results/smoke

      - name: Run parity self-check
        run: |
          python3 tests/parity/compare_measurements.py \
            benchmark/results/smoke/Objects.csv \
            benchmark/results/smoke/Objects.csv \
            --fail-on-gap

      - name: Run impact reporter smoke
        run: |
          python3 benchmark/impact_report.py \
            --image-rows 1000 \
            --object-count-parity 1.0 \
            --numeric-parity 0.99 \
            --cellprofiler-seconds 600 \
            --morphojet-seconds 60 \
            --cellprofiler-rss-mb 8000 \
            --morphojet-rss-mb 4000 \
            --fail-on-gap
