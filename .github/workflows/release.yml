name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release assets
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Verify
        run: |
          cargo fmt -- --check
          cargo test
          cargo clippy --all-targets -- -D warnings

      - name: Build binary
        run: cargo build --release -p morphojet

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          os="$(echo "${RUNNER_OS}" | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m)"
          name="morphojet-${version}-${os}-${arch}"
          mkdir -p "dist/${name}"
          cp target/release/morphojet "dist/${name}/"
          cp README.md LICENSE "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          shasum -a 256 "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
