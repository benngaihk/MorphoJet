name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release assets
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-l3.txt

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1a3a6d54512beeaffd394f8d516ca16f2c506a20 # 1.97.0
        with:
          components: rustfmt, clippy

      - name: Install Python image dependencies
        run: python3 -m pip install --disable-pip-version-check --requirement requirements-l3.txt

      - name: Verify
        run: |
          cargo fmt -- --check
          cargo test --locked --workspace --all-targets
          cargo clippy --locked --workspace --all-targets -- -D warnings
          python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit --file Cargo.lock

      - name: Build binary
        run: cargo build --locked --release -p morphojet

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          os="$(echo "${RUNNER_OS}" | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m)"
          name="morphojet-${version}-${os}-${arch}"
          mkdir -p "dist/${name}"
          cp target/release/morphojet "dist/${name}/"
          cp README.md README.zh-CN.md LICENSE "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          shasum -a 256 "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          files=(dist/*.tar.gz dist/*.sha256)
          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${files[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${tag}" "${files[@]}" --verify-tag --generate-notes --repo "${GITHUB_REPOSITORY}"
          fi
